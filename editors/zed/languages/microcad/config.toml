name = "Microcad"
grammar = "microcad"
path_suffixes = ["µcad", "ucad", "mcad"]
line_comments = ["// ", "/// "]
block_comment = ["/*", "*/"]
autoclose_before = ";:.,=}])>"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "<", end = ">", close = true, newline = true },
]
